[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# pyflakes (F), pycodestyle errors (E), warnings (W), isort (I), bugbear (B),
# comprehensions (C4), pyupgrade (UP)
select = ["F", "E", "W", "I", "B", "C4", "UP"]
ignore = [
    "E501",   # line length handled pragmatically; not enforced hard
    "B008",   # function calls in defaults (dataclass field(default_factory=...))
    "B905",   # zip(strict=): lengths are validated before zipping where it matters
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true
# Pragmatic: this is an educational project, not strictly typed end-to-end.
disallow_untyped_defs = false
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = ["tabulate", "plotly.*", "streamlit"]
ignore_missing_imports = true
